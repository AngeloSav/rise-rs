#sets environment variables
[env]
RUST_LOG = "info"

# These arguments will be used in all further experiments, if not redefined in each section
# In particular, `bin` is the path of the binary that will be run
[global]
bin = '../target/release/create_posting_mdata'
# input-path = '/data1/InvertedIndexes/inverted_indexes/ccnews/cc_url'
input-path = '/data1/InvertedIndexes/rgb/ccnews/ccnews.rgb.bin'


# Starting from here each section is an experiment -------------------

[mdata.static]
out-path = '/data1/InvertedIndexes/built_indexes/pef/cc_url.rgb.static.mdata'
block-size = 128

