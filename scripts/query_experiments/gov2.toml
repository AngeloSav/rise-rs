# OPTCOMP ----------------------------------------------------

[optcomp]
index-path = '/data1/InvertedIndexes/built_indexes/pef/gov2.optcomp.pef.out'
index-kind = 'optcomp'

[optcomp.gov2]
query-kind = ['boolean-and', 'ranked-and', 'ranked-or', 'wand', 'maxscore']
meta-path = '/data1/InvertedIndexes/built_indexes/pef/gov2.static.mdata'

[optcomp.blockmax_static]
query-kind = ['bm-wand', 'bm-maxscore']
meta-path = '/data1/InvertedIndexes/built_indexes/pef/gov2.static.mdata'

[optcomp.blockmax_variable]
query-kind = ['bm-wand', 'bm-maxscore']
meta-path = '/data1/InvertedIndexes/built_indexes/pef/gov2.var.mdata'
