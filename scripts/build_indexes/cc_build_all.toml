[env]
RUST_LOG = "info"

[global]
bin = '../target/release/build_index'
# input-path = '{RISE_DATA_DIR}/ccnews/ccnews.bin'
input-path = '{RISE_DATA_DIR}/ccnews/ccnews.rgb.bin'

# Starting from here each section is an experiment -------------------

[bic.build]
idx-kind = 'block_interpolative'
out-path = '{RISE_DATA_DIR}/built_indexes/ccnews.rgb.bic.idx'

[vbyte.build]
idx-kind = 'block_vbyte'
out-path = '{RISE_DATA_DIR}/built_indexes/ccnews.rgb.vbyte.idx'

[ef.build]
idx-kind = 'ef'
out-path = '{RISE_DATA_DIR}/built_indexes/ccnews.rgb.ef.idx'

[upef.build]
idx-kind = 'upef'
out-path = '{RISE_DATA_DIR}/built_indexes/ccnews.rgb.upef.idx'

[opt.build]
idx-kind = 'opt'
out-path = '{RISE_DATA_DIR}/built_indexes/ccnews.rgb.opt.idx'

[optcomp.build]
idx-kind = 'optcomp'
out-path = '{RISE_DATA_DIR}/built_indexes/ccnews.rgb.optcomp.idx'
